<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error.exe</title>
    <style>
        body {
            font-family: "MS Sans Serif", "Microsoft YaHei", Tahoma, sans-serif;
            background: #008080;
            margin: 0;
            padding: 20px;
            overflow: hidden;
        }
        .win95-window {
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            box-shadow: 4px 4px 0 #000000;
            width: 100%;
            max-width: 460px;
            margin: 30px auto;
            overflow: hidden;
        }
        .title-bar {
            background: linear-gradient(to right, #000080, #1084d0);
            color: white;
            padding: 3px 6px;
            font-weight: bold;
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 13px;
            cursor: move;
        }
        .content {
            padding: 20px;
            text-align: center;
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
        }
        #topic {
            font-size: 21px;
            line-height: 1.4;
            min-height: 160px;
            background: #ffffff;
            border: 2px inset #c0c0c0;
            padding: 20px;
            margin: 20px 0;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: inset 2px 2px 0 #808080;
        }
        button {
            font-family: "MS Sans Serif";
            font-size: 15px;
            padding: 10px 24px;
            margin: 8px;
            background: #c0c0c0;
            border-top: 2px solid #ffffff;
            border-left: 2px solid #ffffff;
            border-right: 2px solid #808080;
            border-bottom: 2px solid #808080;
            cursor: pointer;
            min-width: 180px;
        }
        button:disabled {
            background: #808080;
            color: #ccc;
            cursor: not-allowed;
        }
        .spicy-btn { 
            background: #ffcccc; 
            border-color: #ff6666;
            color: #990000;
        }
        .warning-text {
            margin-top: 25px;
            font-size: 15px;
            color: #990000;
            font-weight: bold;
            line-height: 1.6;
        }
        #countdown {
            font-size: 18px;
            color: #ff0000;
            font-weight: bold;
            margin: 10px 0;
            min-height: 24px;
        }
    </style>
</head>

        function startCountdown() {
            canClick = false;
            let timeLeft = 5;
            countdownEl.textContent = `等待 ${timeLeft} 秒後可再次抽取...`;
            
            const timer = setInterval(() => {
                timeLeft--;
                if (timeLeft > 0) {
                    countdownEl.textContent = `等待 ${timeLeft} 秒後可再次抽取...`;
                } else {
                    clearInterval(timer);
                    countdownEl.textContent = "";
                    canClick = true;
                }
            }, 1000);
        }

        function drawNormalTopic() {
            if (!canClick) return;
            const randomIndex = Math.floor(Math.random() * normalTopics.length);
            document.getElementById("topic").innerHTML = `<strong>${normalTopics[randomIndex]}</strong>`;
            startCountdown();
        }

        function drawSpicyTopic() {
            if (!canClick) return;
            const randomIndex = Math.floor(Math.random() * spicyTopics.length);
            document.getElementById("topic").innerHTML = `<strong>${spicyTopics[randomIndex]}</strong>`;
            startCountdown();
        }
    </script>

</html>
